pekko {
  # --- ACTOR & SERIALIZATION ---
  actor {
    provider = "cluster"
    serialization-bindings {
      "com.conquerer.server.domain.common.JsonSerializable" = jackson-json
    }
  }

  # --- NETWORK & REMOTE ---
  remote {
    artery {
      canonical.hostname = "127.0.0.1"
      canonical.port = ${?PORT}
    }
  }

  # --- CLUSTER & SHARDING ---
  cluster {
    seed-nodes = [
      "pekko://ConquererSystem@127.0.0.1:2551"
    ]
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"

    sharding {
      # 8 GB RAM varken aktörleri çok hızlı kapatmak (passivation) performansı düşürür.
      # Saniyede 4000 istekte aktörler RAM'de kalsın ki sürekli DB'den uyanmasınlar.
      passivation-strategy {
        idle-entity {
          timeout = 120 s # 5s yerine 120s yaparak DB üzerindeki 'Recovery' yükünü kestik.
        }
      }
      number-of-shards = 100
    }
  }

  # --- PERSISTENCE PLUGINS ---
  persistence {
    journal.plugin = "jdbc-journal"
    snapshot-store.plugin = "jdbc-snapshot-store"
  }
}

# --- HTTP SERVER AYARI ---
http {
  port = 8080
  port = ${?HTTP_PORT}
}

# --- JDBC JOURNAL CONFIG (Kritik Dispatcher Bağlantısı) ---
jdbc-journal {
  use-shared-db = "db"
  # DB yazma işini ana thread'lerden (default-dispatcher) ayırıyoruz.
  # "Invalid Sequence Number" hatalarını engelleyen asıl sigorta budur.
  plugin-dispatcher = "jdbc-journal-dispatcher"
}

jdbc-snapshot-store {
  use-shared-db = "db"
}

jdbc-read-journal {
  use-shared-db = "db"
}

# --- SLICK & HIKARI DATABASE POOL ---
pekko-persistence-jdbc {
  shared-databases {
    db {
      profile = "slick.jdbc.PostgresProfile$"
      db {
        host = "localhost"
        url = "jdbc:postgresql://localhost:5432/conquerer"
        user = "postgres"
        password = "password"
        driver = "org.postgresql.Driver"

        # 1000 VU ve 4000 RPS için kapıyı genişletiyoruz
        numThreads = 40      # Hikari thread havuzu
        maxConnections = 40  # Veritabanı bağlantı havuzu
        minConnections = 10

        # Bağlantı hatalarını önlemek için bekleme süreleri
        connectionTimeout = 5000ms
        validationTimeout = 3000ms

        # PostgreSQL için optimizasyon
        properties = {
          reWriteBatchedInserts = true # JDBC seviyesinde batch desteği
        }
      }
    }
  }
}

# --- ÖZEL DISPATCHER TANIMI ---
# Veritabanı bloklayan (blocking) bir işlem olduğu için onu izole ediyoruz.
jdbc-journal-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    # numThreads ile aynı olmalı (1:1 oran)
    fixed-pool-size = 40
  }
  # Her mesajda thread değişimi yaparak aktörler arasında adaleti sağlar
  throughput = 1
}