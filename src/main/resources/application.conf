pekko {
  # --- ACTOR & SERIALIZATION ---
  actor {
    provider = "cluster"
    serialization-bindings {
      "com.conquerer.server.domain.common.JsonSerializable" = jackson-json
    }
  }

  # --- NETWORK & REMOTE ---
  remote {
    artery {
      canonical.hostname = "127.0.0.1"
      canonical.port = ${?PORT}
    }
  }

  # --- CLUSTER & SHARDING ---
  cluster {
    seed-nodes = [
      "pekko://ConquererSystem@127.0.0.1:2551"
    ]
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"

    sharding {
      # 8 GB RAM varken aktörleri çok hızlı kapatmak (passivation) performansı düşürür.
      # Saniyede 4000 istekte aktörler RAM'de kalsın ki sürekli DB'den uyanmasınlar.
      passivation-strategy {
        idle-entity {
          timeout = 120 s # 5s yerine 120s yaparak DB üzerindeki 'Recovery' yükünü kestik.
        }
      }
      number-of-shards = 100
    }
  }

  # --- PERSISTENCE PLUGINS (ScyllaDB / Cassandra) ---
  persistence {
    journal.plugin = "pekko.persistence.cassandra.journal"
    snapshot-store.plugin = "pekko.persistence.cassandra.snapshot"
    datastax-java-driver-config = "datastax-java-driver"
  }
}

# --- HTTP SERVER AYARI ---
http {
  port = 8080
  port = ${?HTTP_PORT}
}

# --- SCYLLADB / CASSANDRA PERSISTENCE CONFIG ---
pekko.persistence.cassandra {
  journal {
    max-concurrent-deletes = 100
    support-all-persistence-ids = false
    keyspace = "conquerer"
    # ScyllaDB ile uyumluluk için auto-create'i kapatıyoruz (CQL schema'yı elle uygula)
    keyspace-autocreate = false
    tables-autocreate = false
  }

  snapshot {
    keyspace = "conquerer"
    keyspace-autocreate = false
    tables-autocreate = false

  }
}

# --- DATASTAX JAVA DRIVER (ScyllaDB bağlantısı) ---
datastax-java-driver {
  basic.load-balancing-policy.local-datacenter = "datacenter1"
  basic {
    contact-points = ["127.0.0.1:9042"]
    contact-points = [${?SCYLLA_CONTACT_POINTS}]
    load-balancing-policy.local-datacenter = "datacenter1"
    load-balancing-policy.local-datacenter = ${?SCYLLA_DATACENTER}
  }
  speculative-execution-policy {
    class = ConstantSpeculativeExecutionPolicy
    max-executions = 3
    delay = 100 milliseconds
  }
  advanced {
    connection {
      pool.local.size = 1
      max-requests-per-connection = 1024
    }
    # ScyllaDB'ye ilk bağlantıda otomatik retry
    reconnect-on-init = true
    auth-provider {
      class = PlainTextAuthProvider
      username = "cassandra"
      username = ${?SCYLLA_USER}
      password = "cassandra"
      password = ${?SCYLLA_PASSWORD}
    }
  }
}